site_name: Agentic-Notify
site_description: An open-source Python SDK for building agentic, notification-driven workflows.
site_url: https://nikhilkanamadi.github.io/OpenNotify/

theme:
  name: material
  palette:
    - scheme: slate
      primary: black
      accent: white
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: white
      accent: black
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details

nav:
  - Getting Started: index.md
  - Architecture: architecture.md
  - Extending Adapters: adapters.md
  - API Reference: api.md
